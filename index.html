        this.state = { hasError: false, error: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }

      componentDidCatch(error, errorInfo) {
        console.error('React render error:', error, errorInfo);
      }

      render() {
        if (this.state.hasError) {
          return (
            <div style={{ maxWidth: '420px', margin: '0 auto', minHeight: '100vh', padding: '24px', background: '#FAFAFA' }}>

                <div style={{ color: '#7f1d1d', lineHeight: 1.7, fontSize: '14px' }}>
                  {this.state.error?.message || '未知錯誤'}
                </div>
                <button
                  onClick={() => window.location.reload()}
                  style={{ marginTop: '16px', background: '#0078D7', color: '#fff', border: '0', borderRadius: '12px', padding: '12px 16px', fontWeight: 700, cursor: 'pointer' }}
                >
                  重新整理

            </div>
          );

      }

      if (code >= 1 && code <= 3) return { icon: 'fa-cloud-sun', text: '多雲', color: 'text-gray-500', bg: 'bg-gray-100' };
      if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) return { icon: 'fa-cloud-rain', text: '雨天', color: 'text-blue-500', bg: 'bg-blue-50' };
      if (code >= 71 && code <= 86) return { icon: 'fa-snowflake', text: '降雪', color: 'text-cyan-500', bg: 'bg-cyan-50' };
      if (code >= 95) return { icon: 'fa-bolt', text: '雷雨', color: 'text-indigo-500', bg: 'bg-indigo-50' };
      return { icon: 'fa-cloud', text: '陰天', color: 'text-gray-400', bg: 'bg-gray-50' };
    };

    const getDayOfWeek = (dateString) => {
      const days = ['日', '一', '二', '三', '四', '五', '六'];
      const d = new Date(dateString);
      return `${d.getMonth() + 1}/${d.getDate()}(${days[d.getDay()]})`;
    };

    const ExchangeRateWidget = () => {
      const [rate, setRate] = useState(null);
      const [amount, setAmount] = useState(10000);
      const [isKrwToTwd, setIsKrwToTwd] = useState(true);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        let cancelled = false;

        const fetchRate = async () => {
          try {
            const res = await fetch('https://open.er-api.com/v6/latest/TWD');
            const data = await res.json();
            const nextRate = Number(data?.rates?.KRW);
            if (!cancelled) {
              setRate(Number.isFinite(nextRate) && nextRate > 0 ? nextRate : 42.5);
              setLoading(false);
            }
          } catch (err) {
            if (!cancelled) {
              setRate(42.5);
              setLoading(false);
            }
          }
        };

        fetchRate();
        return () => {
          cancelled = true;
        };
      }, []);

      const numericAmount = Number(amount) || 0;
      const outputAmount = rate ? (isKrwToTwd ? numericAmount / rate : numericAmount * rate) : 0;
      const sourceCurrency = isKrwToTwd ? 'KRW' : 'TWD';
      const targetCurrency = isKrwToTwd ? 'TWD' : 'KRW';

      const handleToggleDirection = () => {
        setIsKrwToTwd((prev) => !prev);
        setAmount(isKrwToTwd ? 1000 : 10000);
      };

      return (
        <div className="bg-white rounded-xl p-5 border border-gray-100 shadow-sm relative overflow-hidden">
          <div className="flex items-center justify-between mb-4">
            <div>
              <p className="text-sm text-gray-500 font-serif mb-1 tracking-wider">EXCHANGE RATE</p>
              <h3 className="text-xl font-serif-tc font-bold text-gray-800 tracking-wide">匯率試算</h3>
            </div>
            <div className="w-10 h-10 rounded-full bg-green-50 text-green-500 flex items-center justify-center">
              <i className="fa-solid fa-dollar-sign text-[20px]"></i>
            </div>
          </div>

          {loading ? (
            <p className="text-sm text-gray-400">載入匯率中...</p>
          ) : (
            <div>
              <p className="text-xs text-gray-400 mb-3 font-medium">參考匯率 1 TWD 約 {rate?.toFixed(2)} KRW</p>
              <div className="flex items-center space-x-2 bg-gray-50 p-2 rounded-lg border border-gray-100 relative z-0">
                <span className="font-semibold text-gray-500 pl-2 w-10 text-sm">{sourceCurrency}</span>
                <input
                  type="number"
                  inputMode="decimal"
                  value={amount}
                  onChange={(e) => setAmount(e.target.value)}
                  className="bg-transparent w-full text-right outline-none font-bold text-gray-800 text-xl tracking-wide"
                />
              </div>
              <div className="flex justify-center my-[-12px] relative z-10">
                <button onClick={handleToggleDirection} className="bg-white border border-gray-200 p-1.5 rounded-full shadow-sm text-[#0078D7] hover:bg-gray-50 active:scale-95 transition-all" aria-label="切換匯率方向">
                  <i className="fa-solid fa-arrows-up-down text-[16px]"></i>
                </button>
              </div>
              <div className="flex items-center justify-between bg-[#E5F1FB] p-3 pt-5 rounded-lg relative z-0 mt-1">
                <span className="font-bold text-[#0078D7] w-10 text-sm">{targetCurrency}</span>
                <span className="font-black text-2xl text-[#0078D7] tracking-wide">{rate ? Math.round(outputAmount).toLocaleString() : '---'}</span>
              </div>
            </div>
          )}
        </div>
      );
    };

    function App() {
      const [activeTab, setActiveTab] = useState('prep');
      const [selectedEvent, setSelectedEvent] = useState(null);
      const [weeklyWeather, setWeeklyWeather] = useState(null);

      useEffect(() => {
        let cancelled = false;

        const fetchWeather = async () => {
          try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=35.1028&longitude=129.0403&daily=weather_code,temperature_2m_max,temperature_2m_min&forecast_days=7&timezone=Asia%2FSeoul');
            const data = await res.json();
            const daily = data?.daily;
            if (!daily || !Array.isArray(daily.time) || !Array.isArray(daily.temperature_2m_max) || !Array.isArray(daily.temperature_2m_min) || !Array.isArray(daily.weather_code)) {
              throw new Error('天氣資料格式異常');
            }
            const forecast = daily.time.map((time, idx) => ({
              date: time,
              max: daily.temperature_2m_max[idx],
              min: daily.temperature_2m_min[idx],
              code: daily.weather_code[idx]
            }));
            if (!cancelled) {
              setWeeklyWeather(forecast.slice(0, 7));
            }
          } catch (err) {
            console.error('Weather fetch failed:', err);
            if (!cancelled) {
              setWeeklyWeather([]);
            }
          }
        };

        fetchWeather();
        return () => {
          cancelled = true;
        };
      }, []);

      useEffect(() => {
        document.body.style.overflow = selectedEvent ? 'hidden' : '';
        return () => {
          document.body.style.overflow = '';
        };
      }, [selectedEvent]);

      const tripWeatherMap = useMemo(() => {
        const map = {};
        (weeklyWeather || []).forEach((item) => {
          map[item.date] = item;
        });
        return map;
      }, [weeklyWeather]);

      const renderCardDetails = (item, isSubOption = false, keyIdx = 0) => (
        <div
          key={keyIdx}
          onClick={() => setSelectedEvent(item)}
          className={`group bg-white rounded-2xl p-4 border border-gray-100 shadow-sm transition-all cursor-pointer relative overflow-hidden active:scale-[0.995] ${isSubOption ? 'ml-6 mt-3' : ''}`}
        >
          <div className="absolute left-0 top-0 bottom-0 w-1 bg-[#E5F1FB]"></div>
          <div className="flex justify-between items-start pl-2">
            <div className="flex-1 pr-4">
              {!isSubOption && item.time && (
                <div className="flex items-center text-xs text-gray-400 font-mono mb-2 font-medium">
                  <i className="fa-solid fa-clock mr-1.5 text-[12px]"></i>
                  {item.time}
                </div>
              )}
              {isSubOption && <div className="text-[10px] font-bold text-gray-400 uppercase mb-1">OPTION</div>}
              <h3 className={`${isSubOption ? 'text-md' : 'text-lg'} font-serif-tc font-bold text-gray-800 mb-1 leading-snug`}>{item.title}</h3>
              <p className="text-sm text-gray-500 line-clamp-2 leading-relaxed">{item.description}</p>
              <div className="flex flex-wrap gap-2 mt-3">
                {item.tags && item.tags.map((tag, i) => (
                  <span key={`${tag}-${i}`} className="px-2.5 py-1 text-[10px] font-bold text-[#0078D7] border border-[#0078D7]/30 rounded-full bg-blue-50/50">{tag}</span>
                ))}
              </div>
            </div>
            {!isSubOption && item.icon && (
              <div className="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-[#0078D7] shrink-0">
                <i className={`fa-solid ${item.icon} text-[18px]`}></i>
              </div>
            )}
            {isSubOption && (
              <div className="w-8 h-8 rounded-full bg-[#E5F1FB] flex items-center justify-center text-[#0078D7] shrink-0">
                <i className="fa-solid fa-chevron-right text-[14px]"></i>
              </div>

        </div>

              <span className="font-serif font-black text-xl tracking-tighter text-[#0078D7] pr-1">BUSAN</span>
              <button onClick={() => setActiveTab('prep')} className={`whitespace-nowrap font-serif-tc font-bold text-sm transition-colors relative pb-1 ${activeTab === 'prep' ? 'text-[#0078D7]' : 'text-gray-400'}`}>行前準備{activeTab === 'prep' && <span className="absolute bottom-0 left-0 w-full h-0.5 bg-[#0078D7] rounded-full"></span>}</button>
              {itineraryData.map((day) => (
                <button key={`btn-${day.day}`} onClick={() => setActiveTab(`day${day.day}`)} className={`whitespace-nowrap font-serif-tc font-bold text-sm transition-colors relative pb-1 ${activeTab === `day${day.day}` ? 'text-[#0078D7]' : 'text-gray-400'}`}>
                  {day.dateLabel}
                  {activeTab === `day${day.day}` && <span className="absolute bottom-0 left-0 w-full h-0.5 bg-[#0078D7] rounded-full"></span>}
                </button>
              ))}
              <button onClick={() => setActiveTab('tools')} className={`whitespace-nowrap font-serif-tc font-bold text-sm transition-colors relative pb-1 ${activeTab === 'tools' ? 'text-[#0078D7]' : 'text-gray-400'}`}>工具{activeTab === 'tools' && <span className="absolute bottom-0 left-0 w-full h-0.5 bg-[#0078D7] rounded-full"></span>}</button>
            </div>
          </div>

          <main className="min-h-[85vh]">
            {activeTab === 'prep' && (
              <div className="pb-24 animate-fade-in">

                  <h1 className="text-3xl leading-tight font-serif-tc font-bold">行前準備指南</h1>
                </div>

                <div className="px-5 space-y-6">

                    <h2 className="text-lg font-serif-tc font-bold text-gray-800 flex items-center mb-3"><i className="fa-solid fa-square-check mr-2 text-[#0078D7] text-[18px]"></i>行前核對清單</h2>
                    <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-4 space-y-4">
                      {prepData.checklist.map((item, idx) => (
                        <div key={idx} className="flex gap-3">
                          <div className="mt-1 flex-shrink-0 text-[#0078D7]"><i className="fa-solid fa-circle-check text-[16px]"></i></div>
                          <div>
                            <h4 className="font-bold text-gray-800 text-sm mb-1">{item.title}</h4>
                            <p className="text-xs text-gray-500 leading-relaxed">{item.desc}</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </section>

                  <section>
                    <h2 className="text-lg font-serif-tc font-bold text-gray-800 flex items-center mb-3"><i className="fa-solid fa-mobile-screen mr-2 text-[#0078D7] text-[18px]"></i>必備 App 下載</h2>
                    <div className="grid grid-cols-2 gap-3">
                      {prepData.apps.map((app, idx) => (
                        <div key={idx} className="bg-white rounded-xl border border-gray-100 shadow-sm p-3">
                          <h4 className="font-bold text-[#0078D7] text-sm mb-1">{app.name}</h4>
                          <p className="text-[11px] text-gray-500 leading-snug">{app.desc}</p>
                        </div>
                      ))}
                    </div>
                  </section>

                  <section>
                    <h2 className="text-lg font-serif-tc font-bold text-gray-800 flex items-center mb-3"><i className="fa-solid fa-credit-card mr-2 text-[#0078D7] text-[18px]"></i>網卡與支付</h2>
                    <div className="bg-[#FAFAFA] rounded-xl border-l-4 border-[#0078D7] p-4 shadow-sm space-y-3">
                      {prepData.payment.map((item, idx) => (
                        <div key={idx}>
                          <h4 className="font-bold text-gray-800 text-sm mb-0.5">{item.title}</h4>
                          <p className="text-xs text-gray-500 leading-relaxed">{item.desc}</p>
                        </div>
                      ))}
                    </div>
                  </section>

                  <section>
                    <h2 className="text-lg font-serif-tc font-bold text-gray-800 flex items-center mb-3"><i className="fa-solid fa-house mr-2 text-[#0078D7] text-[18px]"></i>住宿區域推薦</h2>
                    <div className="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                      <div className="bg-[#E5F1FB] p-4">
                        <span className="text-[10px] font-bold text-[#0078D7] uppercase tracking-wider block mb-1">本次行程推薦首選</span>
                        <h3 className="font-serif-tc font-bold text-lg text-gray-900">{prepData.accommodation.recommended}</h3>
                        <p className="text-xs text-gray-600 mt-2 leading-relaxed">{prepData.accommodation.reason}</p>
                      </div>
                      <div className="p-4 space-y-3 bg-gray-50">
                        <p className="text-xs font-bold text-gray-400 mb-2">其他區域比較</p>
                        {prepData.accommodation.comparisons.map((comp, idx) => (
                          <div key={idx} className="flex justify-between items-center bg-white p-2 rounded-lg border border-gray-100">
                            <span className="font-bold text-sm w-16">{comp.area}</span>
                            <div className="flex flex-col flex-1 pl-2">
                              <span className="text-[11px] text-green-600 flex items-center"><i className="fa-solid fa-circle-check mr-1 text-[10px]"></i>{comp.pro}</span>
                              <span className="text-[11px] text-red-500 flex items-center"><i className="fa-solid fa-xmark mr-1 text-[10px]"></i>{comp.con}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </section>

                  <section>
                    <h2 className="text-lg font-serif-tc font-bold text-gray-800 flex items-center mb-3"><i className="fa-solid fa-suitcase mr-2 text-[#0078D7] text-[18px]"></i>天氣與行李打包</h2>
                    <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-4 space-y-4">
                      {prepData.weather.map((item, idx) => (
                        <div key={idx}>
                          <h4 className="font-bold text-gray-800 text-sm mb-1">{item.title}</h4>
                          <p className="text-xs text-gray-500 leading-relaxed">{item.desc}</p>
                        </div>
                      ))}
                    </div>
                  </section>
                </div>
              </div>
            )}

            {activeTab.startsWith('day') && (() => {
              const dayData = itineraryData.find((d) => `day${d.day}` === activeTab);
              const matchedWeather = tripWeatherMap[dayData.tripDate] || null;
              const weatherUI = matchedWeather ? getWeatherIcon(matchedWeather.code) : null;

              return (
                <div className="pb-24 animate-fade-in">
                  <div className="pt-6 pb-4 px-5">
                    <div className="flex justify-between items-start mb-2 gap-3">
                      <p className="text-[#0078D7] font-serif tracking-widest text-sm font-semibold">DAY {dayData.day}</p>
                      <div className="flex items-center gap-2 flex-wrap justify-end">
                        <div className="flex items-center px-2.5 py-1 rounded-full bg-gray-100 border border-white shadow-sm">
                          <i className="fa-solid fa-wallet text-gray-500 mr-1.5 text-[13px]"></i>
                          <span className="text-xs font-bold text-gray-700">{dayData.budget}</span>
                        </div>
                        {weatherUI && (
                          <div className={`flex items-center px-2.5 py-1 rounded-full ${weatherUI.bg} border border-white shadow-sm`}>
                            <i className={`fa-solid ${weatherUI.icon} ${weatherUI.color} mr-1.5 text-[14px]`}></i>
                            <span className="text-xs font-bold text-gray-700">{Math.round(matchedWeather.min)}° - {Math.round(matchedWeather.max)}°</span>
                          </div>
                        )}
                      </div>
                    </div>
                    <h1 className="text-3xl leading-tight font-serif-tc font-bold">{dayData.title}</h1>
                    {!matchedWeather && (
                      <p className="text-xs text-gray-400 mt-2">即時預報僅顯示未來 7 天，因此此日期未套用即時天氣。</p>
                    )}
                  </div>

                  <div className="mx-5 mb-8 bg-[#FAFAFA] border-l-4 border-[#0078D7] p-4 rounded-r-xl shadow-sm">
                    <div className="flex items-center text-[#0078D7] mb-2 font-bold">
                      <i className="fa-solid fa-triangle-exclamation mr-2 text-[16px]"></i>
                      <span className="ml-1">今日備忘錄</span>
                    </div>
                    <ul className="space-y-2">
                      {dayData.memo.map((item, idx) => (
                        <li key={idx} className="text-sm text-gray-600 flex items-start">
                          <span className="mr-2 text-[#0078D7]">•</span>
                          <span>{item}</span>
                        </li>
                      ))}
                    </ul>
                  </div>

                  <div className="px-5">
                    {dayData.events.map((evt, idx) => (
                      <div key={`evt-${idx}`} className="relative mb-2">
                        {evt.type === 'single' ? (
                          renderCardDetails(evt, false, `s-${idx}`)
                        ) : (
                          <div className="bg-gray-50 rounded-2xl p-4 border border-dashed border-gray-200">
                            <div className="flex items-center text-xs text-gray-400 font-mono mb-2 font-medium">
                              <i className="fa-solid fa-clock mr-1.5 text-[12px]"></i>
                              {evt.time}
                            </div>
                            <h3 className="text-lg font-serif-tc font-bold text-gray-800 flex items-center">
                              <i className="fa-solid fa-utensils mr-2 text-[#0078D7] text-[16px]"></i>
                              {evt.title}
                              <span className="ml-2 text-xs font-sans font-normal text-gray-500 bg-gray-200 px-2 py-0.5 rounded-full">{evt.options.length} 個選項</span>
                            </h3>
                            <p className="text-sm text-gray-500 mt-1 mb-2">{evt.description}</p>
                            <div className="space-y-3 relative before:absolute before:inset-y-0 before:left-3 before:w-0.5 before:bg-gray-200">
                              {evt.options.map((opt, optIdx) => renderCardDetails({ ...opt, time: null }, true, `opt-${optIdx}`))}
                            </div>

                        {evt.transit && idx !== dayData.events.length - 1 && (
                          <div className="flex flex-col items-center py-2">
                            <div className="w-0.5 h-6 bg-gradient-to-b from-gray-200 to-transparent"></div>
                            <div className="z-10 flex items-center space-x-2 bg-white px-3 py-1.5 rounded-full border border-[#E5F1FB] shadow-sm text-xs text-[#0078D7] font-medium my-[-4px]">
                              <i className={`fa-solid ${evt.transit.icon} text-[14px]`}></i>
                              <span>{evt.transit.method} • <span className="text-gray-500">{evt.transit.duration}</span></span>
                            </div>
                            <div className="w-0.5 h-6 bg-gradient-to-t from-gray-200 to-transparent"></div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}

            {activeTab === 'tools' && (
              <div className="p-5 animate-fade-in pb-24">
                <div className="pt-2 pb-6">
                  <p className="text-[#0078D7] font-serif tracking-widest text-sm mb-2 font-semibold uppercase">Utilities</p>
                  <h1 className="text-3xl leading-tight font-serif-tc font-bold">實用工具</h1>
                </div>

                <div className="bg-white rounded-xl p-5 mb-4 border border-gray-100 shadow-sm">
                  <div className="flex items-center justify-between mb-4">
                    <div>
                      <p className="text-sm text-gray-500 font-serif mb-1 tracking-wider">7-DAY FORECAST</p>
                      <h3 className="text-xl font-serif-tc font-bold text-gray-800 tracking-wide">釜山一週天氣</h3>
                    </div>
                    <div className="w-10 h-10 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center">
                      <i className="fa-solid fa-cloud-rain text-[20px]"></i>
                    </div>
                  </div>

                  {weeklyWeather === null ? (
                    <p className="text-sm text-gray-400">天氣資料連線中...</p>
                  ) : weeklyWeather.length === 0 ? (
                    <p className="text-sm text-gray-400">目前抓不到天氣資料，稍後重整再試。</p>
                  ) : (
                    <div className="space-y-3">
                      {weeklyWeather.map((day, idx) => {
                        const wUI = getWeatherIcon(day.code);
                        return (
                          <div key={idx} className="flex items-center justify-between p-2 hover:bg-gray-50 rounded-lg border-b border-gray-50 last:border-0">
                            <span className="w-16 text-sm font-bold text-gray-700">{idx === 0 ? '今天' : getDayOfWeek(day.date)}</span>
                            <div className={`flex items-center w-20 px-2 py-1 rounded text-xs font-bold ${wUI.bg} ${wUI.color}`}>
                              <i className={`fa-solid ${wUI.icon} text-[14px]`}></i>
                              <span className="ml-1.5">{wUI.text}</span>
                            </div>
                            <div className="w-20 text-right text-sm font-medium text-gray-600">{Math.round(day.min)}° <span className="text-gray-300 mx-1">/</span> {Math.round(day.max)}°</div>

                      {selectedEvent.time && <span className="text-xs font-bold text-[#0078D7] bg-[#E5F1FB] px-2 py-1 rounded">{selectedEvent.time}</span>}
                      {selectedEvent.tags && selectedEvent.tags.slice(0, 1).map((t, i) => (
                        <span key={`t-${i}`} className="text-[10px] font-bold text-gray-500 border border-gray-200 px-2 py-1 rounded-full">{t}</span>
                      ))}
                    </div>
                    <h2 className="text-2xl font-serif-tc font-bold text-gray-900 leading-snug">{selectedEvent.title}</h2>
                    <p className="text-sm text-gray-500 font-medium mt-1 select-all">{selectedEvent.koreanName || ''}</p>
                  </div>
                  <button onClick={() => setSelectedEvent(null)} className="p-2 bg-gray-100 rounded-full text-gray-500 hover:bg-gray-200 shrink-0 flex items-center justify-center w-10 h-10" aria-label="關閉詳情">
                    <i className="fa-solid fa-xmark text-[20px]"></i>
                  </button>
                </div>

                <div className="p-5 overflow-y-auto pb-28 custom-scrollbar flex-1 safe-bottom">
                  <div className="space-y-6">
                    <div className="flex gap-3">
                      {selectedEvent.stayTime && (
                        <div className="flex-1 bg-gray-50 rounded-xl p-3 flex flex-col items-center justify-center text-center">
                          <i className="fa-regular fa-hourglass-half text-[#0078D7] text-[16px] mb-1"></i>
                          <span className="text-[10px] text-gray-400 font-bold mb-0.5">建議停留</span>
                          <span className="text-xs font-bold text-gray-700">{selectedEvent.stayTime}</span>
                        </div>
                      )}
                      {selectedEvent.queueTime && (
                        <div className="flex-1 bg-gray-50 rounded-xl p-3 flex flex-col items-center justify-center text-center">
                          <i className="fa-solid fa-people-line text-orange-500 text-[16px] mb-1"></i>
                          <span className="text-[10px] text-gray-400 font-bold mb-0.5">排隊狀況</span>
                          <span className="text-xs font-bold text-gray-700">{selectedEvent.queueTime}</span>
                        </div>
                      )}
                    </div>

                    {selectedEvent.highlights && (
                      <div className="bg-[#E5F1FB]/50 border-l-4 border-[#0078D7] p-3 rounded-r-xl">
                        <h4 className="text-xs font-serif-tc font-bold text-[#0078D7] tracking-wider mb-1 flex items-center"><i className="fa-solid fa-star mr-1.5"></i>最佳看點 / 必點招牌</h4>
                        <p className="text-gray-700 text-sm font-medium leading-relaxed">{selectedEvent.highlights}</p>
                      </div>
                    )}

                    <div>
                      <h4 className="text-xs font-serif-tc font-bold text-gray-400 tracking-wider mb-2 flex items-center"><i className="fa-solid fa-book-open mr-1.5 text-[14px]"></i>深度介紹</h4>
                      <p className="text-gray-700 leading-relaxed text-[15px] whitespace-pre-line">{selectedEvent.story || selectedEvent.description || '暫無補充介紹。'}</p>
                    </div>

                    <div>
                      <h4 className="text-xs font-serif-tc font-bold text-gray-400 tracking-wider mb-2 flex items-center"><i className="fa-solid fa-lightbulb mr-1.5 text-[14px] text-amber-500"></i>實用攻略與提醒</h4>
                      <div className="bg-amber-50/50 p-4 rounded-xl border border-amber-100">
                        <p className="text-amber-800 font-medium leading-relaxed text-[14px] whitespace-pre-line">{selectedEvent.tips || '暫無補充提醒。'}</p>
                      </div>
                    </div>

                    <div className="border-t border-gray-100 pt-5">
                      <h4 className="text-xs font-serif-tc font-bold text-gray-400 tracking-wider mb-2 flex items-center"><i className="fa-solid fa-map-pin mr-1.5"></i>詳細地址</h4>
                      <p className="text-gray-600 text-sm select-all bg-gray-50 p-3 rounded-lg">{selectedEvent.address || '未提供地址'}</p>
                    </div>
                  </div>
                </div>

                <div className="absolute bottom-6 left-5 right-5 z-50">
                  <a
                    href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(selectedEvent.mapQuery || selectedEvent.koreanName || selectedEvent.title)}`}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="w-full bg-[#0078D7] text-white py-4 rounded-2xl font-bold font-serif-tc shadow-lg shadow-[#0078D7]/30 flex items-center justify-center tracking-widest text-[15px]"
                  >
                    <i className="fa-solid fa-location-arrow mr-2 text-[18px]"></i>
                    一鍵導航 Google Map
                  </a>
                </div>
              </div>
            </>
          )}
        </div>
      );
    }

    const rootEl = document.getElementById('root');
    if (!rootEl) {
      throw new Error('找不到 root 容器');
    }

    if (ReactDOM.createRoot) {
      ReactDOM.createRoot(rootEl).render(
        <ErrorBoundary>
          <App />
        </ErrorBoundary>
      );
    } else {
      ReactDOM.render(
        <ErrorBoundary>
          <App />
        </ErrorBoundary>,
        rootEl
      );
    }
  </script>
</body>
</html>
