    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }
      componentDidCatch(error, errorInfo) {
        console.error('React render error:', error, errorInfo);
      }
      render() {
        if (this.state.hasError) {
          return (
            <div style={{ maxWidth: '420px', margin: '0 auto', minHeight: '100vh', padding: '24px', background: '#FAFAFA' }}>
              <div style={{ background: '#fff', border: '1px solid #fecaca', borderRadius: '20px', padding: '20px', boxShadow: '0 8px 30px rgba(0,0,0,.06)' }}>
                <div style={{ color: '#b91c1c', fontWeight: 800, marginBottom: '8px' }}>頁面執行發生錯誤</div>
                <div style={{ color: '#7f1d1d', lineHeight: 1.7, fontSize: '14px' }}>{this.state.error?.message || '未知錯誤'}</div>
                <button onClick={() => window.location.reload()} style={{ marginTop: '16px', background: '#0078D7', color: '#fff', border: '0', borderRadius: '12px', padding: '12px 16px', fontWeight: 700, cursor: 'pointer' }}>重新整理</button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    const getWeatherIcon = (code) => {
      if (code === 0) return { icon: 'fa-sun', text: '晴天', color: 'text-amber-500', bg: 'bg-amber-50' };
      if (code >= 1 && code <= 3) return { icon: 'fa-cloud-sun', text: '多雲', color: 'text-gray-500', bg: 'bg-gray-100' };
      if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) return { icon: 'fa-cloud-rain', text: '雨天', color: 'text-blue-500', bg: 'bg-blue-50' };
      if (code >= 71 && code <= 86) return { icon: 'fa-snowflake', text: '降雪', color: 'text-cyan-500', bg: 'bg-cyan-50' };
      if (code >= 95) return { icon: 'fa-bolt', text: '雷雨', color: 'text-indigo-500', bg: 'bg-indigo-50' };
      return { icon: 'fa-cloud', text: '陰天', color: 'text-gray-400', bg: 'bg-gray-50' };
    };

    const getDayOfWeek = (dateString) => {
      const days = ['日', '一', '二', '三', '四', '五', '六'];
      const d = new Date(dateString);
      return `${d.getMonth() + 1}/${d.getDate()}(${days[d.getDay()]})`;
    };

    const ExchangeRateWidget = () => {
      const [rate, setRate] = useState(null);
      const [amount, setAmount] = useState(10000);
      const [isKrwToTwd, setIsKrwToTwd] = useState(true);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        let cancelled = false;
        const fetchRate = async () => {
          try {
            const res = await fetch('https://open.er-api.com/v6/latest/TWD');
            const data = await res.json();
            const nextRate = Number(data?.rates?.KRW);
            if (!cancelled) {
              setRate(Number.isFinite(nextRate) && nextRate > 0 ? nextRate : 42.5);
              setLoading(false);
            }
          } catch (err) {
            if (!cancelled) {
              setRate(42.5);
              setLoading(false);
            }
          }
        };
        fetchRate();
        return () => { cancelled = true; };
      }, []);

      const numericAmount = Number(amount) || 0;
      const outputAmount = rate ? (isKrwToTwd ? numericAmount / rate : numericAmount * rate) : 0;
      const sourceCurrency = isKrwToTwd ? 'KRW' : 'TWD';
      const targetCurrency = isKrwToTwd ? 'TWD' : 'KRW';

      const handleToggleDirection = () => {
        setIsKrwToTwd((prev) => !prev);
        setAmount(isKrwToTwd ? 1000 : 10000);
      };

      return (
        <div className="bg-white rounded-xl p-5 border border-gray-100 shadow-sm relative overflow-hidden">
          <div className="flex items-center justify-between mb-4">
            <div>
              <p className="text-sm text-gray-500 font-serif mb-1 tracking-wider">EXCHANGE RATE</p>

            </div>
            <div className="w-10 h-10 rounded-full bg-green-50 text-green-500 flex items-center justify-center">
              <i className="fa-solid fa-dollar-sign text-[20px]"></i>
            </div>
          </div>

          {loading ? (
            <p className="text-sm text-gray-400">載入匯率中...</p>
          ) : (
            <div>
              <p className="text-xs text-gray-400 mb-3 font-medium">參考匯率 1 TWD 約 {rate?.toFixed(2)} KRW</p>
              <div className="flex items-center space-x-2 bg-gray-50 p-2 rounded-lg border border-gray-100 relative z-0">
                <span className="font-semibold text-gray-500 pl-2 w-10 text-sm">{sourceCurrency}</span>
                <input type="number" inputMode="decimal" value={amount} onChange={(e) => setAmount(e.target.value)} className="bg-transparent w-full text-right outline-none font-bold text-gray-800 text-xl tracking-wide" />
              </div>
              <div className="flex justify-center my-[-12px] relative z-10">
                <button onClick={handleToggleDirection} className="bg-white border border-gray-200 p-1.5 rounded-full shadow-sm text-[#0078D7] hover:bg-gray-50 active:scale-95 transition-all" aria-label="切換匯率方向">
                  <i className="fa-solid fa-arrows-up-down text-[16px]"></i>
                </button>
              </div>
              <div className="flex items-center justify-between bg-[#E5F1FB] p-3 pt-5 rounded-lg relative z-0 mt-1">
                <span className="font-bold text-[#0078D7] w-10 text-sm">{targetCurrency}</span>
                <span className="font-black text-2xl text-[#0078D7] tracking-wide">{rate ? Math.round(outputAmount).toLocaleString() : '---'}</span>
              </div>
            </div>
          )}
        </div>
      );

              min: daily.temperature_2m_min[idx],

                        {weatherUI && <div className={`flex items-center px-2.5 py-1 rounded-full ${weatherUI.bg} border border-white shadow-sm`}><i className={`fa-solid ${weatherUI.icon} ${weatherUI.color} mr-1.5 text-[14px]`}></i><span className="text-xs font-bold text-gray-700">{Math.round(matchedWeather.min)}° - {Math.round(matchedWeather.max)}°</span></div>}
                      </div>
                    </div>
                    <h1 className="text-3xl leading-tight font-serif-tc font-bold">{dayData.title}</h1>
                    {!matchedWeather && <p className="text-xs text-gray-400 mt-2">即時預報只顯示未來 7 天，因此這裡不會把錯誤日期的天氣硬套進行程。</p>}
                  </div>

                  <div className="mx-5 mb-4 bg-white rounded-2xl border border-gray-100 shadow-sm p-4 space-y-3">
                    <div className="grid grid-cols-2 gap-3 text-sm">
                      <div className="bg-gray-50 rounded-xl p-3"><div className="text-[11px] text-gray-400 font-bold mb-1">今日主題</div><div className="font-bold text-gray-800 leading-relaxed">{dayData.summary.theme}</div></div>
                      <div className="bg-gray-50 rounded-xl p-3"><div className="text-[11px] text-gray-400 font-bold mb-1">整體節奏評估</div><div className="font-bold text-gray-800 leading-relaxed">{dayData.summary.pace}</div></div>
                    </div>
                    <div className="bg-gray-50 rounded-xl p-3"><div className="text-[11px] text-gray-400 font-bold mb-1">今日移動重點</div><div className="text-sm text-gray-700 leading-relaxed font-bold">{dayData.summary.route}</div></div>
                    <div className="bg-[#E5F1FB]/60 rounded-xl p-3 border border-[#E5F1FB]"><div className="text-[11px] text-[#0078D7] font-bold mb-1">今天最值得期待的亮點</div><div className="text-sm text-gray-800 leading-relaxed font-medium">{dayData.summary.highlight}</div></div>
                  </div>

                  <div className="mx-5 mb-8 bg-[#FAFAFA] border-l-4 border-[#0078D7] p-4 rounded-r-xl shadow-sm">
                    <div className="flex items-center text-[#0078D7] mb-2 font-bold"><i className="fa-solid fa-triangle-exclamation mr-2 text-[16px]"></i><span className="ml-1">今日備忘錄與備案</span></div>
                    <ul className="space-y-2">{dayData.memo.map((item, idx) => <li key={idx} className="text-sm text-gray-600 flex items-start"><span className="mr-2 text-[#0078D7]">•</span><span className="leading-relaxed">{item}</span></li>)}</ul>
                  </div>

                  <div className="px-5">
                    {dayData.events.map((evt, idx) => (
                      <div key={`evt-${idx}`} className="relative mb-2">
                        {evt.type === 'single' ? renderCardDetails(evt, false, `s-${idx}`) : (
                          <div className="bg-gray-50 rounded-2xl p-4 border border-dashed border-gray-200">
                            <div className="flex items-center text-xs text-gray-400 font-mono mb-2 font-medium"><i className="fa-solid fa-clock mr-1.5 text-[12px]"></i>{evt.time}</div>
                            <h3 className="text-lg font-serif-tc font-bold text-gray-800 flex items-center"><i className="fa-solid fa-utensils mr-2 text-[#0078D7] text-[16px]"></i>{evt.title}<span className="ml-2 text-xs font-sans font-normal text-gray-500 bg-gray-200 px-2 py-0.5 rounded-full">{evt.options.length} 個選項</span></h3>
                            <p className="text-sm text-gray-500 mt-1 mb-2 leading-relaxed">{evt.description}</p>
                            <div className="space-y-3 relative before:absolute before:inset-y-0 before:left-3 before:w-0.5 before:bg-gray-200">
                              {evt.options.map((opt, optIdx) => renderCardDetails({ ...opt, time: null }, true, `opt-${optIdx}`))}
                            </div>
                          </div>
                        )}
                        {evt.transit && idx !== dayData.events.length - 1 && (
                          <div className="flex flex-col items-center py-2">
                            <div className="w-0.5 h-6 bg-gradient-to-b from-gray-200 to-transparent"></div>
                            <div className="z-10 flex items-center space-x-2 bg-white px-3 py-1.5 rounded-full border border-[#E5F1FB] shadow-sm text-xs text-[#0078D7] font-medium my-[-4px]"><i className={`fa-solid ${evt.transit.icon} text-[14px]`}></i><span>{evt.transit.method} • <span className="text-gray-500">{evt.transit.duration}</span></span></div>
                            <div className="w-0.5 h-6 bg-gradient-to-t from-gray-200 to-transparent"></div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}

            {activeTab === 'tools' && (
              <div className="p-5 animate-fade-in pb-24">
                <div className="pt-2 pb-6"><p className="text-[#0078D7] font-serif tracking-widest text-sm mb-2 font-semibold uppercase">Utilities</p><h1 className="text-3xl leading-tight font-serif-tc font-bold">實用工具</h1></div>

                <div className="bg-white rounded-xl p-5 mb-4 border border-gray-100 shadow-sm">
                  <div className="flex items-center justify-between mb-4">
                    <div><p className="text-sm text-gray-500 font-serif mb-1 tracking-wider">7-DAY FORECAST</p><h3 className="text-xl font-serif-tc font-bold text-gray-800 tracking-wide">釜山一週天氣</h3></div>
                    <div className="w-10 h-10 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center"><i className="fa-solid fa-cloud-rain text-[20px]"></i></div>
                  </div>
                  {weeklyWeather === null ? <p className="text-sm text-gray-400">天氣資料連線中...</p> : weeklyWeather.length === 0 ? <p className="text-sm text-gray-400">目前抓不到天氣資料，稍後重整再試。</p> : (
                    <div className="space-y-3">
                      {weeklyWeather.map((day, idx) => {
                        const wUI = getWeatherIcon(day.code);
                        return <div key={idx} className="flex items-center justify-between p-2 hover:bg-gray-50 rounded-lg border-b border-gray-50 last:border-0"><span className="w-16 text-sm font-bold text-gray-700">{idx === 0 ? '今天' : getDayOfWeek(day.date)}</span><div className={`flex items-center w-20 px-2 py-1 rounded text-xs font-bold ${wUI.bg} ${wUI.color}`}><i className={`fa-solid ${wUI.icon} text-[14px]`}></i><span className="ml-1.5">{wUI.text}</span></div><div className="w-20 text-right text-sm font-medium text-gray-600">{Math.round(day.min)}° <span className="text-gray-300 mx-1">/</span> {Math.round(day.max)}°</div></div>;
                      })}
                    </div>
                  )}
                </div>

                <ExchangeRateWidget />

                <div className="mt-8 bg-gray-900 rounded-xl p-5 text-white shadow-lg">
                  <h3 className="font-serif-tc font-bold text-lg mb-2 flex items-center"><i className="fa-solid fa-circle-info mr-2 text-indigo-300 text-[18px]"></i>旅行提示</h3>
                  <p className="text-sm text-gray-300 leading-relaxed mb-3">這份 5天4夜 的攻略沒有為了打卡而疲於奔命，而是讓您在海浪、烤肉香與巷弄文化中，找到屬於自己的旅行節奏。</p>
                  <p className="text-sm text-gray-300 leading-relaxed mb-3">韓國地圖導航強烈建議以 Naver Map 為主，Google Maps 在韓國的步行與大眾運輸資訊通常不完整。</p>
                </div>
              </div>
            )}
          </main>

          {selectedEvent && (
            <>
              <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 transition-opacity" onClick={() => setSelectedEvent(null)}></div>
              <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white rounded-t-3xl z-50 shadow-2xl flex flex-col h-[90vh] animate-slide-up">
                <div className="flex justify-between items-start p-5 pb-3 shrink-0 border-b border-gray-100">
                  <div className="pr-4">
                    <div className="flex items-center space-x-2 mb-2 flex-wrap">
                      {selectedEvent.time && <span className="text-xs font-bold text-[#0078D7] bg-[#E5F1FB] px-2 py-1 rounded">{selectedEvent.time}</span>}
                      {selectedEvent.tags && selectedEvent.tags.slice(0, 3).map((t, i) => <span key={`t-${i}`} className="text-[10px] font-bold text-gray-500 border border-gray-200 px-2 py-1 rounded-full">{t}</span>)}
                    </div>
                    <h2 className="text-2xl font-serif-tc font-bold text-gray-900 leading-snug">{selectedEvent.title}</h2>
                    <p className="text-sm text-gray-500 font-medium mt-1 select-all">{selectedEvent.koreanName || ''}</p>
                  </div>
                  <button onClick={() => setSelectedEvent(null)} className="p-2 bg-gray-100 rounded-full text-gray-500 hover:bg-gray-200 shrink-0 flex items-center justify-center w-10 h-10" aria-label="關閉詳情"><i className="fa-solid fa-xmark text-[20px]"></i></button>
                </div>

                <div className="p-5 overflow-y-auto pb-28 custom-scrollbar flex-1 safe-bottom">
                  <div className="space-y-6">
                    <div className="flex gap-3">
                      {selectedEvent.stayTime && <div className="flex-1 bg-gray-50 rounded-xl p-3 flex flex-col items-center justify-center text-center"><i className="fa-regular fa-hourglass-half text-[#0078D7] text-[16px] mb-1"></i><span className="text-[10px] text-gray-400 font-bold mb-0.5">預估停留/用餐</span><span className="text-xs font-bold text-gray-700">{selectedEvent.stayTime}</span></div>}
                      {selectedEvent.queueTime && <div className="flex-1 bg-gray-50 rounded-xl p-3 flex flex-col items-center justify-center text-center"><i className="fa-solid fa-people-line text-orange-500 text-[16px] mb-1"></i><span className="text-[10px] text-gray-400 font-bold mb-0.5">排隊狀況</span><span className="text-xs font-bold text-gray-700">{selectedEvent.queueTime}</span></div>}
                    </div>

                    {selectedEvent.highlights && <div className="bg-[#E5F1FB]/50 border-l-4 border-[#0078D7] p-3 rounded-r-xl"><h4 className="text-xs font-serif-tc font-bold text-[#0078D7] tracking-wider mb-1 flex items-center"><i className="fa-solid fa-star mr-1.5"></i>最佳看點 / 推薦招牌</h4><p className="text-gray-800 text-sm font-medium leading-relaxed whitespace-pre-line">{selectedEvent.highlights}</p></div>}

                    <div>
                      <h4 className="text-xs font-serif-tc font-bold text-gray-400 tracking-wider mb-2 flex items-center"><i className="fa-solid fa-book-open mr-1.5 text-[14px]"></i>動線與決策理由</h4>
                      <p className="text-gray-700 leading-relaxed text-[15px] whitespace-pre-line">{selectedEvent.story || selectedEvent.description || '暫無補充介紹。'}</p>
                    </div>

                    <div>
                      <h4 className="text-xs font-serif-tc font-bold text-gray-400 tracking-wider mb-2 flex items-center"><i className="fa-solid fa-lightbulb mr-1.5 text-[14px] text-amber-500"></i>實用攻略與備案提醒</h4>
                      <div className="bg-amber-50/50 p-4 rounded-xl border border-amber-100"><p className="text-amber-800 font-medium leading-relaxed text-[14px] whitespace-pre-line">{selectedEvent.tips || '暫無補充提醒。'}</p></div>
                    </div>

                    <div className="border-t border-gray-100 pt-5">
                      <h4 className="text-xs font-serif-tc font-bold text-gray-400 tracking-wider mb-2 flex items-center"><i className="fa-solid fa-map-pin mr-1.5"></i>詳細地址</h4>
                      <p className="text-gray-600 text-sm select-all bg-gray-50 p-3 rounded-lg">{selectedEvent.address || '未提供地址'}</p>
                    </div>
                  </div>
                </div>

                <div className="absolute bottom-6 left-5 right-5 z-50">
                  <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(selectedEvent.mapQuery || selectedEvent.koreanName || selectedEvent.title)}`} target="_blank" rel="noopener noreferrer" className="w-full bg-[#0078D7] text-white py-4 rounded-2xl font-bold font-serif-tc shadow-lg shadow-[#0078D7]/30 flex items-center justify-center tracking-widest text-[15px]"><i className="fa-solid fa-location-arrow mr-2 text-[18px]"></i>一鍵導航 (建議搭配 Naver Map 使用)</a>
                </div>
              </div>
            </>
          )}
        </div>
      );
    }

    const rootEl = document.getElementById('root');
    if (!rootEl) throw new Error('找不到 root 容器');

    if (ReactDOM.createRoot) {
      ReactDOM.createRoot(rootEl).render(<ErrorBoundary><App /></ErrorBoundary>);
    } else {
      ReactDOM.render(<ErrorBoundary><App /></ErrorBoundary>, rootEl);
    }
  </script>
</body>
</html>
